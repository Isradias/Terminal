<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Terminal_os</title>
		<link rel="stylesheet" href="home.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div class="container">
			<div class="titulo">
				<div class="logo">
					<img src="../assets/img/terminal_logo.png" alt="Terminal OS logo" />
					<h1>TERMINAL_OS</h1>
				</div>
				<hr />
				<p>AUTENTICAÇÃO DE USUÁRIO REQUERIDA</p>
			</div>
			<div class="formulario">
				<label for="campo_email">IDENTIFICADOR (EMAIL):</label>
				<div class="input-wrapper">
					<span class="material-symbols-outlined icon">mail</span>

					<input
						type="text"
						id="email"
						name="campo_email"
						placeholder="usuario@terminal.exe"
					/>
				</div>
				<br />
				<label for="campo_senha">CHAVE DE ACESSO (SENHA):</label>
				<div class="input-wrapper">
					<span class="material-symbols-outlined icon">lock</span>

					<input
						type="password"
						id="senha"
						name="campo_senha"
						placeholder="0000000"
					/>
				</div>
				<button
					type="button"
					onclick="validate_login()"
					class="btn-login"
				>
					ENTRAR >
				</button>
				<div class="ou">
					<hr />
					ou
					<hr />
				</div>
				<a href="/cadastro" class="btn-cadastro">CRIAR NOVA CONTA</a>
				<p id="erro" style="color: red"></p>
			</div>
			<div class="ou">
				<hr />
			</div>

			<div class="twofa">
				<div class="twofa-row">
					<label class="switch">
						<input type="checkbox" id="toggle2fa" onchange="toggle2FA()">
						<span class="slider"></span>
					</label>
					<div class="twofa-text">
						<span class="switch-label">Ativar autenticação em duas etapas</span>
						<span id="status2fa" class="status">Desativado</span>
					</div>
				</div>
			</div>

			<img id="qr">
			<h2>Verificador de código</h2>
			<div class="verificador">
				<input id="codigo" placeholder="Digite o código">
				<button onclick="verificar()">Verificar</button>
			</div>
		</div>
	</body>
		<script src="home.js"></script>
</html>
