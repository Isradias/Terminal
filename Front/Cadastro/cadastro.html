<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <title>Terminal</title>
</head>

<body>
    <div>
        <div class="titulo"></div>
        <div class="logo">
            <img src="../assets/img/terminal_logo.png" alt="terminal_logo">
            <h1>TERMINAL_OS</h1>
        </div>
        <hr />
        <p>SYSTEM ACCESS // UNAUTHORIZED ACCESS IS LOGGED</p>
    </div>

    <div class="container">
        <img width="32" height="32" src="https://img.icons8.com/windows/32/add-user-male--v1.png"
            alt="add-user-male--v1" />
        <div class="novaconta">Criar Nova Conta
            <p>INITIALIZING USER_REGISTRATION_SEQUENCE.EXE</p>
        </div>

        <label for="nick">NICKNAME (APELIDO)</label><br>
        <div class="nome">
            <img width="32" height="32" src="https://img.icons8.com/windows/32/gender-neutral-user.png"
                alt="gender-neutral-user" />
            <input
                type="text"
                id="nick"
                name="nick"
                placeholder="usuario"
                minlength="3"
                maxlength="30"
                required
            />
        </div>
        <br>

        <label for="email">IDENTIFICADOR (EMAIL)</label><br>
        <div class="email">
            <img width="24" height="24" src="https://img.icons8.com/material-outlined/24/new-post.png" alt="new-post" />
            <input
                type="email"
                id="email"
                name="email"
                placeholder="usuario@terminal.exe"
                required
            />
        </div>
        <br>
        <div class="grupo-senha">

            <div class="campo">
                <label for="senha">CHAVE DE ACESSO (SENHA)</label>

                <div class="senha">
                    <img width="24" height="24" src="https://img.icons8.com/forma-thin/24/lock.png" alt="lock" />
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Digite sua senha"
                        minlength="8"
                        maxlength="100"
                        required
                    />
                </div>
            </div>

            <div class="campo">
                <label for="confirmar_senha">CONFIRMAR CHAVE</label>

                <div class="confirmar_senha">
                    <img width="24" height="24" src="https://img.icons8.com/material-outlined/24/security-checked.png"
                        alt="security-checked" />

                    <input
                        type="password"
                        id="confirmar_senha"
                        name="confirmar_senha"
                        placeholder="Confirme sua senha"
                        minlength="8"
                        maxlength="100"
                        required
                    />
                </div>
            </div>

        </div>
        <br>

       <div class="checkbox-area">
            <input type="checkbox" id="termos" name="termos" required>
            <label for="termos">Aceito os termos de serviço e política de privacidade</label>
        </div>
        <br>

        <button  id="btCriar_usuario" onclick="cadastrar()" type="submit">
            Confirmar Criação de Conta
        </button>

        <div class="conexao">
            <hr>
            conexão segura
            <hr />
        </div>
        <br>

        <p>
            Já tem uma conta? <a href="/">Entrar no Sistema</a>
        </p>
    </div>

    <script src="/Cadastro/cadastro.js"></script>
</body>

</html>
