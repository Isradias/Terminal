<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Terminal_os</title>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=account_circle,grid_view,logout"
		/>
		<link rel="stylesheet" href="/Fases/hub.css" />
	</head>
	<body>
		<header>
			<div class="logo">
				<img
					src="../assets/img/terminal_logo.png"

				/>

			</div>
			<div class="class_nivel">

			<div class="usuario">

			<div class="sair">
				<!-- TODO: Isso aqui deveria sem um link de logout -->
				<span class="material-symbols-outlined"> logout </span>
			</div>

		<div class="titulo">
			<h1>SELEÇÃO DE FASES</h1>
			<h4>> LISTANDO NODOS DE ACESSO DISPONÍVEIS NA REDE LOCAL...</h4>
		</div>

			<div class="mapa_titulo">
				<h4>MAPA DE ACESSO</h4>
				<h4>5 ENTRADAS ENCONTRADAS</h4>
			</div>
			<div class="missoes">
				<!-- ELEMENTO CRIADO DINAMICAMENTE COM JS -->
				<template id="missao_template">
					<img class="status_img" src="" alt="status" />
				</template>
			</div>
			<!-- DETALHES DA MISSÃO SERÃO COLOCADOS AQUI -->
		</div>
		<!-- TODO: Apagar isso aqui, foi só pra teste -->
		<button type="button" onclick="subir_nivel()">Up</button>

	<script src="/Fases/hub.js"></script>
