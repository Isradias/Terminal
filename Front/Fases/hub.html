<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Terminal_os</title>
		<link
			rel="icon"
			type="image/png"
			href="../assets/img/terminal_logo.png"
		/>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
		/>
		<link rel="stylesheet" href="/Fases/hub.css" />
		<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;300;400;600&display=swap" rel="stylesheet">
	</head>
	<body>
		<header>
			<div class="logo">
				<img src="../assets/img/terminal_logo.png" alt="logo" />
				<h3>Terminal</h3>
			</div>
			<div class="class_nivel">
				<h4 id="nivel">NIVEL:</h4>
			</div>
			<div class="usuario">
				<h4 id="nick">usuario</h4>
				<span class="material-symbols-outlined"> account_circle </span>
			</div>
			<div class="sair">
				 <button type="button" class="logout">
					 <span class="material-symbols-outlined"> logout </span>
				 </button>
			</div>
		</header>
		<div class="container">
			<div class="titulo">
				<h1>SELEÇÃO DE FASES</h1>
				<h4>> LISTANDO NODOS DE ACESSO DISPONÍVEIS NA REDE LOCAL...</h4>
			</div>
			<div class="mapa" id="id_mapa">
				<div class="mapa_titulo">
					<h4>MAPA DE ACESSO</h4>
					<h4 id="entradas_encontradas">ENTRADAS ENCONTRADAS</h4>
				</div>
				<!-- ELEMENTO CRIADO DINAMICAMENTE COM JS -->
				<template id="missao_template">
					<button class="btn_missao" type="button">
						<div class="status">status</div>
						<div class="missao_resumo">
							<h4 class="fase">FASE XX <span class="dificuldade">Difficulty</span></h4>
							<h2 class="titulo_missao">Titulo</h2>
							<h4 class="subtitulo">Subtitulo</h4>
						</div>
					</button>
				</template>
				<!-- TODO: To sem tempo pra fazer uma aba detalhada k -->
				<!-- DETALHES DA MISSÃO SERÃO COLOCADOS AQUI -->
			</div>
		</div>
		<!-- TODO: Apagar isso aqui, foi só pra teste -->
		<button type="button" onclick="subir_nivel()">Up</button>
		<button type="button" id="reset">Reset</button>
	</body>
	<script src="/Fases/hub.js" type="module"></script>
</html>
