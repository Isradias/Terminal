<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Terminal_os</title>
	<link rel="icon" type="image/png" href="../../../assets/img/terminal_logo.png" />
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;300;400;600&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="/Fases/Missoes/Missao01/styles.css">
</head>

<body>
	<header>
		<div class="logo">
			<img src="../assets/img/terminal_logo.png" alt="logo" />
			<h3>Terminal</h3>
		</div>
		<div class="class_nivel">
			<h4 id="nivel">NIVEL:</h4>
		</div>
		<div class="usuario">
			<h4 id="nick">usuario</h4>
			<span class="material-symbols-outlined"> account_circle </span>
		</div>
		<div class="sair">
			<button type="button" onclick="logout()" class="logout">
				<span class="material-symbols-outlined"> logout </span>
			</button>
		</div>
	</header>
	<div class="container_objetivo">
		<p>Objetivo Atual</p>
		<p id="objetivo">exemplo</p>
	</div>
	<div class="container_terminal" id="id_container_terminal">
		<div class="historico" id="id_historico"></div>
		<p>
			>
			<input type="text" id="command_line" placeholder="digite um comando...">
		</p>
	</div>
</body>

<template id="template">
	<div class="linha">
		<p class="command"></p>
		<p class="response"></p>
	</div>
</template>

<script src="/Fases/Missoes/Missao01/script.js" type="module"></script>

</html>
